# 星途天城（Poco 版本）本地模拟器示例配置。
# 用于真实设备 / 模拟器接入时的参考模板。

# 游戏基础信息
project_name: "星途天城(poco)"
engine_type: cocos2dx_js
package_name: com.xttc.release.poco
activity_name: com.xttc.release.poco/org.cocos2dx.javascript.AppActivity

# 设备配置
device:
  # 设备平台
  platform: android
  # ADB 串号
  serial: "127.0.0.1:16384"
  # 关闭模拟设备，使用真实连接
  use_mock: false

# Poco 连接配置
connection:
  # Poco 主机
  host: 127.0.0.1
  # Poco 端口
  port: 5003

# 游戏连接配置
game:
  # Airtest 设备 URI
  device_uri: "Android:///127.0.0.1:16384"
  # 设备串号
  device_serial: "127.0.0.1:16384"

# 冷启动探索参数
exploration:
  # 最大探索步数
  max_steps: 200
  # 最多发现页面数
  max_pages: 30
  # 每页最多尝试多少个动作
  max_actions_per_page: 20
  # 启动等待时间
  boot_wait_s: 10.0
  # 动作后等待时间
  action_wait_s: 2.0
  # 连续无新页面上限
  no_new_page_limit: 10
  # 探索输出目录
  output_dir: outputs/cold_start

# 视觉模型配置
vision:
  # 启用视觉分析
  enabled: true
  # 视觉模型名称
  model_name: gemini-3-flash-preview
  # 视觉策略
  mode: vision_first
  # 最多保留候选数
  max_candidates: 16
  # 最低置信度
  min_confidence: 0.55

# 文本模型配置
gemini:
  # 文本模型名称
  model_name: gemini-3-flash-preview
  # 采样温度
  temperature: 0.2
  # 最大输出 Token 数
  max_output_tokens: 4096

# 探索安全词
safety:
  # 高风险关键词：命中后尽量避免点击
  dangerous_keywords:
    - 充值
    - 支付
    - 购买
    - 删除
    - 删除账号
    - 退出登录
    - recharge
    - pay
    - purchase
    - delete
  # 安全优先关键词：出现时可优先尝试
  safe_priority_keywords:
    - 关闭
    - 确认
    - 确定
    - 下一步
    - 开始
    - 进入
    - 领取
    - 跳过
    - 返回
    - 大厅
    - 冒险
    - 出战
    - 挑战
    - 自动
    - 结算
    - close
    - confirm
    - next
    - start
    - enter
    - claim
    - skip
    - back
    - ok

# 图数据库配置
graph:
  # 导出的状态图数据库路径
  db_path: outputs/cold_start/graph.db
  # 图探索最大深度
  exploration_max_depth: 20

# 日志级别
log_level: INFO
